name: assetflow_mobile
description: "AssetFlow - IT Varlik Yonetimi Mobil"
publish_to: 'none'
version: 2.3.1+26

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  shared_preferences: ^2.2.3
  intl: 0.20.2
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  open_file: ^3.5.10
  path_provider: ^2.1.3
  google_fonts: ^6.2.1
  flutter_local_notifications: ^18.0.1
  mobile_scanner: ^6.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  file_picker: ^8.1.2
  csv: ^6.0.0
  share_plus: ^10.0.0
  sentry_flutter: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "assets/icon/icon-background.png"
  adaptive_icon_foreground: "assets/icon/icon-foreground.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#1A3A5C"
    theme_color: "#1A3A5C"

flutter_native_splash:
  color: "#1A3A5C"
  image: assets/icon/splash-logo.png
  android_12:
    image: assets/icon/splash-logo.png
    icon_background_color: "#1A3A5C"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/
    - assets/animated/
